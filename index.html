<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz para Carla</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #312e81, #831843);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 28px;
      padding: 28px;
      max-width: 620px;
      width: 100%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      text-align: center;
      animation: fade 0.6s ease;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 2.1rem;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 16px;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.6;
    }

    button {
      background: white;
      color: #831843;
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      margin: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      background: #ffe4ef;
    }

    .option {
      display: block;
      width: 100%;
      margin: 12px 0;
      background: rgba(255,255,255,0.18);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .option:hover {
      background: rgba(255,255,255,0.28);
    }

    .progress {
      height: 10px;
      background: rgba(255,255,255,0.25);
      border-radius: 999px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: #f9a8d4;
      transition: 0.4s;
    }

    .small {
      opacity: 0.8;
      font-size: 0.95rem;
    }

    .heart {
      font-size: 4rem;
      animation: pulse 1s infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.15); }
    }
  </style>
</head>
<body>

  <div class="card" id="app"></div>

  <script>
    const questions = [
      {
        title: "Caso clínico neurológico",
        text: "Hombre de 68 años consulta por inicio súbito de hemiparesia derecha y dificultad para articular palabras. Comprende órdenes simples. Glicemia normal. TA 180/100 mmHg. ¿Cuál es el territorio vascular más probablemente comprometido?",
        options: [
          "Arteria cerebral anterior",
          "Arteria cerebral media izquierda",
          "Arteria cerebral posterior",
          "Arteria basilar"
        ],
        correct: 1,
        explanation: "La hemiparesia derecha más alteración del lenguaje sugiere compromiso del hemisferio dominante, típicamente territorio de la arteria cerebral media izquierda."
      },
      {
        title: "Neurociencias",
        text: "Un paciente queda con incapacidad para formar nuevos recuerdos episódicos después de una lesión cerebral. ¿Qué estructura está más probablemente afectada?",
        options: [
          "Cerebelo",
          "Hipocampo",
          "Núcleo caudado",
          "Área motora primaria"
        ],
        correct: 1,
        explanation: "El hipocampo es clave para la consolidación de nuevos recuerdos episódicos."
      },
      {
        title: "Neuromuscular",
        text: "Mujer de 27 años presenta ptosis, diplopía y debilidad fluctuante que empeora durante el día y mejora con el reposo. ¿Diagnóstico más probable?",
        options: [
          "Síndrome de Guillain-Barré",
          "Miastenia gravis",
          "Esclerosis múltiple",
          "ELA"
        ],
        correct: 1,
        explanation: "La debilidad fluctuante, ocular y fatigable es muy sugerente de miastenia gravis."
      },
      {
        title: "Neuroanatomía clínica",
        text: "Paciente con lesión en el área de Broca. ¿Cuál sería el hallazgo más esperable?",
        options: [
          "Lenguaje fluente pero sin comprensión",
          "Afasia no fluente con comprensión relativamente conservada",
          "Hemianopsia bitemporal",
          "Ataxia cerebelosa"
        ],
        correct: 1,
        explanation: "El área de Broca se asocia a producción del lenguaje. Su lesión produce afasia no fluente."
      },
      {
        title: "Pregunta de supervivencia médica",
        text: "¿Cuántos cafés necesita un interno para sobrevivir un turno largo?",
        options: [
          "Uno",
          "Tres",
          "Depende del residente",
          "Todas las anteriores"
        ],
        correct: 3,
        explanation: "Respuesta científicamente irrefutable: todas las anteriores."
      }
    ];

    let index = 0;
    let score = 0;

    const app = document.getElementById("app");

    function start() {
      app.innerHTML = `
        <h1>🩺 Bienvenida, Dra. Carla</h1>
        <p class="small">Todavía no oficialmente... pero casi 😄</p>
        <p>Tengo un pequeño desafío para ti.</p>
        <p><b>5 preguntas. Un caso clínico. Algo de neurociencias.</b></p>
        <p>Y una recompensa al final.</p>
        <button onclick="showQuestion()">Comenzar</button>
      `;
    }

    function showQuestion() {
      const q = questions[index];
      const progress = ((index) / questions.length) * 100;

      app.innerHTML = `
        <div class="progress"><div class="bar" style="width:${progress}%"></div></div>
        <p class="small">Pregunta ${index + 1} de ${questions.length}</p>
        <h2>${q.title}</h2>
        <p>${q.text}</p>
        ${q.options.map((op, i) => `
          <button class="option" onclick="answer(${i})">${op}</button>
        `).join("")}
      `;
    }

    function answer(selected) {
      const q = questions[index];
      const correct = selected === q.correct;

      if (correct) score++;

      app.innerHTML = `
        <h2>${correct ? "✅ Correcto" : "😅 Casi"}</h2>
        <p>${q.explanation}</p>
        <button onclick="nextQuestion()">Continuar</button>
      `;
    }

    function nextQuestion() {
      index++;
      if (index < questions.length) {
        showQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      app.innerHTML = `
        <div class="progress"><div class="bar" style="width:100%"></div></div>
        <h1>Resultado final</h1>
        <p>Obtuviste <b>${score}/5</b>.</p>
        <p>No esperaba menos de alguien de sexto año de Medicina 😄</p>
        <button onclick="reward()">Ver recompensa</button>
      `;
    }

    function reward() {
      app.innerHTML = `
        <h2>Diagnóstico final</h2>
        <p>El paciente presenta nerviosismo progresivo, taquicardia leve y dificultad para formular una pregunta importante.</p>
        <p><b>Impresión diagnóstica:</b> quiere invitar a salir a una estudiante de Medicina.</p>
        <p><b>Tratamiento recomendado:</b> un café contigo.</p>
        <div class="heart">❤️</div>
        <h1>¿Te gustaría salir conmigo esta semana?</h1>
        <button onclick="yes()">Sí</button>
        <button onclick="maybe()">Lo pensaré</button>
      `;
    }

    function yes() {
      app.innerHTML = `
        <div class="heart">💖</div>
        <h1>¡Me hiciste muy feliz!</h1>
        <p>Ahora solo falta coordinar el café por Instagram 😄</p>
      `;
      confetti();
    }

    function maybe() {
      app.innerHTML = `
        <h1>Gracias por llegar hasta el final ❤️</h1>
        <p>No pasa nada. Igual me alegró poder hacerte este pequeño quiz.</p>
      `;
    }

    function confetti() {
      for (let i = 0; i < 40; i++) {
        const piece = document.createElement("div");
        piece.innerHTML = "❤️";
        piece.style.position = "fixed";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.top = "-20px";
        piece.style.fontSize = Math.random() * 20 + 15 + "px";
        piece.style.animation = `fall ${Math.random() * 2 + 2}s linear forwards`;
        document.body.appendChild(piece);

        setTimeout(() => piece.remove(), 4000);
      }
    }

    const style = document.createElement("style");
    style.innerHTML = `
      @keyframes fall {
        to {
          transform: translateY(110vh) rotate(360deg);
          opacity: 0;
        }
      }
    `;
    document.head.appendChild(style);

    start();
  </script>
</body>
</html>
