<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz para Carla</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #312e81, #831843);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 28px;
      padding: 28px;
      max-width: 620px;
      width: 100%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      text-align: center;
      animation: fade 0.6s ease;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 2.05rem;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 1.45rem;
      margin-bottom: 16px;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.65;
    }

    button {
      background: white;
      color: #831843;
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      margin: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      background: #ffe4ef;
    }

    .option {
      display: block;
      width: 100%;
      margin: 12px 0;
      background: rgba(255,255,255,0.18);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .option:hover {
      background: rgba(255,255,255,0.28);
    }

    .progress {
      height: 10px;
      background: rgba(255,255,255,0.25);
      border-radius: 999px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: #f9a8d4;
      transition: 0.4s;
    }

    .small {
      opacity: 0.82;
      font-size: 0.95rem;
    }

    .heart {
      font-size: 4rem;
      animation: pulse 1s infinite alternate;
      margin: 12px 0;
    }

    .note {
      background: rgba(255,255,255,0.13);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 20px;
      padding: 16px;
      margin: 16px 0;
      text-align: left;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.15); }
    }
  </style>
</head>
<body>

  <div class="card" id="app"></div>

  <script>
    const questions = [
      {
        title: "Caso clínico neurológico",
        text: "Hombre de 68 años consulta por inicio súbito de hemiparesia derecha y dificultad para articular palabras. Comprende órdenes simples. Glicemia normal. TA 180/100 mmHg. ¿Cuál es el territorio vascular más probablemente comprometido?",
        options: [
          "Arteria cerebral anterior",
          "Arteria cerebral media izquierda",
          "Arteria cerebral posterior",
          "Arteria basilar"
        ],
        correct: 1,
        explanation: "La hemiparesia derecha más alteración del lenguaje orienta a compromiso del hemisferio dominante, típicamente en territorio de la arteria cerebral media izquierda."
      },
      {
        title: "Neurociencias",
        text: "Un paciente queda con incapacidad para formar nuevos recuerdos episódicos después de una lesión cerebral. ¿Qué estructura está más probablemente afectada?",
        options: [
          "Cerebelo",
          "Hipocampo",
          "Núcleo caudado",
          "Área motora primaria"
        ],
        correct: 1,
        explanation: "El hipocampo es clave para consolidar nuevos recuerdos episódicos. Por eso su lesión puede producir amnesia anterógrada."
      },
      {
        title: "Neuromuscular",
        text: "Mujer de 27 años presenta ptosis, diplopía y debilidad fluctuante que empeora durante el día y mejora con el reposo. ¿Diagnóstico más probable?",
        options: [
          "Síndrome de Guillain-Barré",
          "Miastenia gravis",
          "Esclerosis múltiple",
          "ELA"
        ],
        correct: 1,
        explanation: "La debilidad ocular, fluctuante y fatigable es muy sugerente de miastenia gravis."
      },
      {
        title: "Neuroanatomía clínica",
        text: "Paciente con lesión en el área de Broca. ¿Cuál sería el hallazgo más esperable?",
        options: [
          "Lenguaje fluente pero sin comprensión",
          "Afasia no fluente con comprensión relativamente conservada",
          "Hemianopsia bitemporal",
          "Ataxia cerebelosa"
        ],
        correct: 1,
        explanation: "El área de Broca se relaciona con la producción del lenguaje. Su lesión produce una afasia no fluente, con comprensión relativamente conservada."
      },
      {
        title: "Pregunta de supervivencia médica",
        text: "Después de un turno largo, ¿cuál sería la indicación más razonable?",
        options: [
          "Un café",
          "Dormir 14 horas",
          "Decir 'estoy bien' aunque claramente no",
          "Todas las anteriores"
        ],
        correct: 3,
        explanation: "Respuesta clínicamente compatible con la vida hospitalaria: todas las anteriores."
      }
    ];

    let index = 0;
    let score = 0;

    const app = document.getElementById("app");

    function start() {
      app.innerHTML = `
        <h1>🩺 Bienvenida, Carla</h1>
        <p class="small">Mini desafío clínico hecho especialmente para ti</p>
        <p>Prometo que no es un examen.</p>
        <p>Son solo <b>5 preguntas</b>, un poco de neurociencias y una pequeña sorpresa al final.</p>
        <button onclick="showQuestion()">Comenzar</button>
      `;
    }

    function showQuestion() {
      const q = questions[index];
      const progress = ((index) / questions.length) * 100;

      app.innerHTML = `
        <div class="progress"><div class="bar" style="width:${progress}%"></div></div>
        <p class="small">Pregunta ${index + 1} de ${questions.length}</p>
        <h2>${q.title}</h2>
        <p>${q.text}</p>
        ${q.options.map((op, i) => `
          <button class="option" onclick="answer(${i})">${op}</button>
        `).join("")}
      `;
    }

    function answer(selected) {
      const q = questions[index];
      const correct = selected === q.correct;

      if (correct) score++;

      app.innerHTML = `
        <h2>${correct ? "✅ Correcto" : "😅 Casi, pero te lo perdono"}</h2>
        <p>${q.explanation}</p>
        <button onclick="nextQuestion()">Continuar</button>
      `;
    }

    function nextQuestion() {
      index++;
      if (index < questions.length) {
        showQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      app.innerHTML = `
        <div class="progress"><div class="bar" style="width:100%"></div></div>
        <h1>Resultado final</h1>
        <p>Obtuviste <b>${score}/5</b>.</p>
        <p>Igual, siendo honesto, el puntaje no era lo más importante de este quiz.</p>
        <button onclick="reward()">Ver conclusión del caso</button>
      `;
    }

    function reward() {
      app.innerHTML = `
        <h2>Conclusión del caso</h2>

        <div class="note">
          <p><b>Motivo de consulta:</b> alguien quería encontrar una forma distinta de decirte algo.</p>
          <p><b>Evolución:</b> se acordó de esa vez en que se juntaron en tu casa y él te iba leyendo casos clínicos.</p>
          <p><b>Hallazgo importante:</b> lo pasó muy bien y le gustaría repetirlo.</p>
        </div>

        <p>
          La verdad es que este quiz era una excusa para preguntarte algo de una forma menos fome.
        </p>

        <p>
          Me gustaría que nos juntemos de nuevo a estudiar casos clínicos, como esa vez.
          Y además tengo algo pendiente que quiero entregarte: tu llavero.
        </p>

        <div class="heart">❤️</div>

        <h1>¿Te gustaría que nos juntemos esta semana?</h1>

        <button onclick="yes()">Sí, me gustaría</button>
        <button onclick="maybe()">Lo pensaré</button>
      `;
    }

    function yes() {
      app.innerHTML = `
        <div class="heart">💖</div>
        <h1>Entonces queda indicado en la ficha clínica</h1>
        <p>
          Plan: estudiar casos clínicos juntos, reírnos un rato
          y entregarte tu llavero pendiente.
        </p>
        <p>Me hiciste muy feliz. Escríbeme por Instagram y coordinamos 😄</p>
      `;
      confetti();
    }

    function maybe() {
      app.innerHTML = `
        <h1>Respuesta válida ❤️</h1>
        <p>
          Gracias por llegar hasta el final.
          Me hacía ilusión hacerte algo distinto y recordarte ese momento bonito estudiando casos clínicos.
        </p>
        <p>
          Y pase lo que pase, el llavero sigue pendiente de entrega 😄
        </p>
      `;
    }

    function confetti() {
      for (let i = 0; i < 45; i++) {
        const piece = document.createElement("div");
        piece.innerHTML = Math.random() > 0.5 ? "❤️" : "✨";
        piece.style.position = "fixed";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.top = "-20px";
        piece.style.fontSize = Math.random() * 20 + 15 + "px";
        piece.style.animation = `fall ${Math.random() * 2 + 2}s linear forwards`;
        piece.style.pointerEvents = "none";
        document.body.appendChild(piece);

        setTimeout(() => piece.remove(), 4000);
      }
    }

    const style = document.createElement("style");
    style.innerHTML = `
      @keyframes fall {
        to {
          transform: translateY(110vh) rotate(360deg);
          opacity: 0;
        }
      }
    `;
    document.head.appendChild(style);

    start();
  </script>
</body>
</html>
